name: Build Aura AI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission
        run: chmod +x gradlew
      
      - name: 🔍 DEBUG - List all files
        run: |
          echo "=== CURRENT DIRECTORY STRUCTURE ==="
          pwd
          ls -la
          echo ""
          echo "=== GRADLE FILES ==="
          find . -name "*.gradle*" -type f
          echo ""
          echo "=== KOTLIN FILES ==="
          find . -name "*.kt" -type f | head -20
      
      - name: 🔧 Check gradle wrapper
        run: |
          echo "=== GRADLE WRAPPER ==="
          if [ -f "gradlew" ]; then
            echo "✅ gradlew exists"
            file gradlew
          else
            echo "❌ gradlew MISSING!"
          fi
          
          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "✅ gradle-wrapper.jar exists"
          else
            echo "❌ gradle-wrapper.jar MISSING!"
          fi
          
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "✅ gradle-wrapper.properties exists"
            cat gradle/wrapper/gradle-wrapper.properties
          else
            echo "❌ gradle-wrapper.properties MISSING!"
          fi
      
      - name: 🔨 Try to build
        run: |
          echo "=== ATTEMPTING BUILD ==="
          ./gradlew tasks --dry-run || echo "❌ Gradle failed"
          echo ""
          echo "=== BUILDING DEBUG ==="
          ./gradlew assembleDebug --stacktrace || echo "❌ Build failed"
      
      - name: 📦 Find APK
        run: |
          echo "=== SEARCHING FOR APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo ""
          echo "=== CHECK BUILD OUTPUT ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No build outputs"
      
      - name: 📤 Upload any APK found
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/reports/
            ./*.log
            ~/.gradle/wrapper/dists/*/gradle*.log
