name: Build Aura AI APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
      
      - name: Run tests
        run: ./gradlew test --stacktrace
      
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AuraAI-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
      
      - name: Get APK size
        id: apk_size
        run: |
          SIZE=$(stat -c%s "app/build/outputs/apk/debug/app-debug.apk" 2>/dev/null || stat -f%z "app/build/outputs/apk/debug/app-debug.apk" 2>/dev/null)
          echo "size=$SIZE" >> $GITHUB_OUTPUT
      
      - name: Build Summary
        run: |
          echo "## ✅ Build Successful! - Aura AI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 APK Details:" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** 1.0.0" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Type:** Debug" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** $(( ${{ steps.apk_size.outputs.size }} / 1048576 )) MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Min SDK:** Android 8.0 (API 26)" >> $GITHUB_STEP_SUMMARY
          echo "- **Target SDK:** Android 14 (API 34)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📥 Download:" >> $GITHUB_STEP_SUMMARY
          echo "The APK is available as a build artifact above ☝️" >> $GITHUB_STEP_SUMMARY
