name: Build Aura AI APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  APP_NAME: "Aura AI"
  PACKAGE_NAME: "com.aura.ai"
  MIN_SDK: 26
  TARGET_SDK: 34

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      checks: write
    
    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Step 2: Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Step 3: Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      # Step 4: Grant execute permission
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # Step 5: Cache Gradle dependencies
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # Step 6: Cache build cache
      - name: Cache build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: ${{ runner.os }}-build-cache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-cache-
      
      # Step 7: Run lint checks
      - name: Run lint checks
        run: ./gradlew lint --stacktrace --no-daemon
      
      # Step 8: Run tests
      - name: Run tests
        run: ./gradlew test --stacktrace --no-daemon
      
      # Step 9: Build APK
      - name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
        run: ./gradlew assemble${{ github.event.inputs.build_type || 'Debug' }} --stacktrace --no-daemon
      
      # Step 10: Get APK information
      - name: Get APK information
        id: apk_info
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          APK_PATH="app/build/outputs/apk/${BUILD_TYPE}/app-${BUILD_TYPE}.apk"
          
          if [ ! -f "$APK_PATH" ]; then
            # Try alternative naming
            APK_PATH="app/build/outputs/apk/${BUILD_TYPE}/app-${BUILD_TYPE}-unsigned.apk"
          fi
          
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(stat -c%s "$APK_PATH" 2>/dev/null || stat -f%z "$APK_PATH" 2>/dev/null)
            APK_SIZE_MB=$((APK_SIZE / 1048576))
            APK_SIZE_KB=$(((APK_SIZE % 1048576) / 1024))
            
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
            echo "apk_size_mb=$APK_SIZE_MB" >> $GITHUB_OUTPUT
            echo "apk_size_kb=$APK_SIZE_KB" >> $GITHUB_OUTPUT
            echo "apk_exists=true" >> $GITHUB_OUTPUT
            
            # Get commit info
            echo "commit_hash=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "commit_message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
            echo "commit_author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          else
            echo "apk_exists=false" >> $GITHUB_OUTPUT
            echo "❌ APK not found at expected path!" >&2
            ls -la app/build/outputs/apk/ || true
            exit 1
          fi
      
      # Step 11: Upload APK artifact (FIXED: using v4)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.event.inputs.build_type || 'debug' }}-${{ steps.apk_info.outputs.commit_hash }}
          path: ${{ steps.apk_info.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 6
          overwrite: true
      
      # Step 12: Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.event.inputs.build_type || 'debug' }}
          path: |
            app/build/reports/tests/
            app/build/reports/androidTests/
          retention-days: 14
      
      # Step 13: Upload lint results
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ github.event.inputs.build_type || 'debug' }}
          path: app/build/reports/lint-results.html
          retention-days: 14
      
      # Step 14: Create build summary
      - name: Create build summary
        if: always()
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          
          # Create status emoji
          if [ "${{ job.status }}" == "success" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="SUCCESS"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILED"
          fi
          
          # Start building summary
          echo "# $STATUS_EMOJI ${{ env.APP_NAME }} Build $STATUS_TEXT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📋 Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | $BUILD_TYPE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [${{ steps.apk_info.outputs.commit_hash }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | ${{ steps.apk_info.outputs.commit_message }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Author** | ${{ steps.apk_info.outputs.commit_author }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Workflow** | [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.apk_info.outputs.apk_exists }}" == "true" ]; then
            echo "## 📱 APK Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Size** | ${{ steps.apk_info.outputs.apk_size_mb }} MB ${{ steps.apk_info.outputs.apk_size_kb }} KB |" >> $GITHUB_STEP_SUMMARY
            echo "| **Package** | ${{ env.PACKAGE_NAME }} |" >> $GITHUB_STEP_SUMMARY
            echo "| **Min SDK** | API ${{ env.MIN_SDK }} (Android 8.0) |" >> $GITHUB_STEP_SUMMARY
            echo "| **Target SDK** | API ${{ env.TARGET_SDK }} (Android 14) |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The APK is available as a build artifact above ☝️" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To download:" >> $GITHUB_STEP_SUMMARY
            echo "1. Click on the **Summary** tab at the top of this page" >> $GITHUB_STEP_SUMMARY
            echo "2. Scroll down to **Artifacts** section" >> $GITHUB_STEP_SUMMARY
            echo "3. Click on the APK name to download" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Build completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> $GITHUB_STEP_SUMMARY
      
      # Step 15: Comment on PR
      - name: Comment PR
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const { repo, owner } = context.repo;
            const runId = context.runId;
            const sha = context.sha.substring(0, 7);
            const buildType = '${{ github.event.inputs.build_type || 'debug' }}';
            const apkSize = '${{ steps.apk_info.outputs.apk_size_mb }} MB ${{ steps.apk_info.outputs.apk_size_kb }} KB';
            
            const comment = `## ✅ Build Successful!
            
            ### 📱 APK Information
            - **Build Type:** ${buildType}
            - **Size:** ${apkSize}
            - **Package:** ${{ env.PACKAGE_NAME }}
            - **Commit:** [${sha}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
            
            ### 📥 Download
            The APK is available as a build artifact:
            1. Go to the [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${runId})
            2. Scroll down to **Artifacts** section
            3. Download the APK file
            
            ### ✅ Checks Passed
            - ✓ Lint checks
            - ✓ Unit tests
            - ✓ Build successful
            
            ---
            *Built with ❤️ by GitHub Actions*`;
            
            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: context.issue.number,
              body: comment
            });
