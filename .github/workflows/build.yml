name: Build Aura AI APK

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  APP_NAME: "Aura AI"
  PACKAGE_NAME: "com.aura.ai"
  MIN_SDK: 26
  TARGET_SDK: 34

jobs:
  build:
    name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write
      checks: write
    
    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Step 2: Set up JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      # Step 3: Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      # Step 4: Grant execute permission
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # Step 5: Cache Gradle dependencies
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # Step 6: Run lint checks
      - name: Run lint checks
        run: ./gradlew lint --stacktrace --no-daemon || true
      
      # Step 7: Run tests
      - name: Run tests
        run: ./gradlew test --stacktrace --no-daemon || true
      
      # Step 8: Build APK
      - name: Build ${{ github.event.inputs.build_type || 'debug' }} APK
        id: build
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          # Capitalize first letter for Gradle task
          BUILD_TYPE_CAP="$(tr '[:lower:]' '[:upper:]' <<< ${BUILD_TYPE:0:1})${BUILD_TYPE:1}"
          
          echo "🔨 Building $BUILD_TYPE APK..."
          ./gradlew assemble$BUILD_TYPE_CAP --stacktrace --no-daemon
          
          # Check if build was successful
          if [ $? -eq 0 ]; then
            echo "✅ Build successful"
            echo "build_success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Build failed"
            echo "build_success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      # Step 9: Find and verify APK
      - name: Find APK
        id: find_apk
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          
          echo "🔍 Searching for APK files..."
          
          # Create directory if it doesn't exist
          mkdir -p app/build/outputs/apk/$BUILD_TYPE
          
          # List all files to debug
          echo "📁 Directory structure:"
          find app/build/outputs -type f 2>/dev/null || echo "No files found"
          
          # Try multiple possible APK paths
          POSSIBLE_PATHS=(
            "app/build/outputs/apk/$BUILD_TYPE/app-$BUILD_TYPE.apk"
            "app/build/outputs/apk/$BUILD_TYPE/app-$BUILD_TYPE-unsigned.apk"
            "app/build/outputs/apk/$BUILD_TYPE/*.apk"
            "app/build/outputs/apk/debug/app-debug.apk"
            "app/build/outputs/apk/release/app-release.apk"
            "app/build/outputs/apk/release/app-release-unsigned.apk"
          )
          
          APK_FOUND=""
          for path in "${POSSIBLE_PATHS[@]}"; do
            if [[ "$path" == *"*"* ]]; then
              # Handle wildcard
              for file in $path; do
                if [ -f "$file" ]; then
                  APK_FOUND="$file"
                  break 2
                fi
              done
            elif [ -f "$path" ]; then
              APK_FOUND="$path"
              break
            fi
          done
          
          if [ -n "$APK_FOUND" ]; then
            echo "✅ APK found at: $APK_FOUND"
            echo "apk_path=$APK_FOUND" >> $GITHUB_OUTPUT
            
            # Get APK details
            APK_SIZE=$(stat -c%s "$APK_FOUND" 2>/dev/null || stat -f%z "$APK_FOUND" 2>/dev/null)
            APK_SIZE_MB=$((APK_SIZE / 1048576))
            APK_SIZE_KB=$(((APK_SIZE % 1048576) / 1024))
            
            echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT
            echo "apk_size_mb=$APK_SIZE_MB" >> $GITHUB_OUTPUT
            echo "apk_size_kb=$APK_SIZE_KB" >> $GITHUB_OUTPUT
            echo "apk_exists=true" >> $GITHUB_OUTPUT
            
            # Get commit info
            echo "commit_hash=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "commit_message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
            echo "commit_author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          else
            echo "❌ No APK found!"
            echo "apk_exists=false" >> $GITHUB_OUTPUT
            
            # Debug: Show full directory structure
            echo "📁 Full directory structure:"
            find . -type f -name "*.apk" 2>/dev/null || echo "No APK files found anywhere"
            
            exit 1
          fi
      
      # Step 10: Upload APK artifact (FIXED: using v4)
      - name: Upload APK artifact
        if: steps.find_apk.outputs.apk_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ github.event.inputs.build_type || 'debug' }}-${{ steps.find_apk.outputs.commit_hash }}
          path: ${{ steps.find_apk.outputs.apk_path }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: true
      
      # Step 11: Upload build reports
      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.event.inputs.build_type || 'debug' }}
          path: |
            app/build/reports/
            app/build/outputs/logs/
          retention-days: 14
      
      # Step 12: Create build summary
      - name: Create build summary
        if: always()
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'debug' }}"
          
          if [ "${{ steps.find_apk.outputs.apk_exists }}" == "true" ]; then
            STATUS_EMOJI="✅"
            STATUS_TEXT="SUCCESS"
          else
            STATUS_EMOJI="❌"
            STATUS_TEXT="FAILED"
          fi
          
          # Start building summary
          echo "# $STATUS_EMOJI ${{ env.APP_NAME }} Build $STATUS_TEXT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📋 Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Type** | $BUILD_TYPE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | [${{ steps.find_apk.outputs.commit_hash }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.find_apk.outputs.apk_exists }}" == "true" ]; then
            echo "## 📱 APK Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Size** | ${{ steps.find_apk.outputs.apk_size_mb }} MB ${{ steps.find_apk.outputs.apk_size_kb }} KB |" >> $GITHUB_STEP_SUMMARY
            echo "| **Path** | \`${{ steps.find_apk.outputs.apk_path }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The APK is available as a build artifact above ☝️" >> $GITHUB_STEP_SUMMARY
          fi
